# Kokpit — Docker Compose
#
# Usage:
#   Dev (hot reload):  docker compose up kokpit-dev
#   Prod:              docker compose up kokpit --build

services:

  # ─── Development (hot reload) ─────────────────────────────
  kokpit-dev:
    build:
      context: .
      target: dev
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: development
      KOKPIT_SESSION_SECRET: change-this-to-a-random-32-char-secret-before-use
      KOKPIT_DB_PATH: /data/users.db
      # WATCHPACK_POLLING: "true"  # Uncomment on Windows/WSL2 if hot reload
                                   # doesn't trigger on file save.
    volumes:
      - .:/app
      - /app/node_modules
      - /app/.next
      - ./data:/data
    restart: unless-stopped

  # ─── Production ───────────────────────────────────────────
  kokpit:
    build:
      context: .
      target: runner
    ports:
      - "3000:3000"
    environment:
      KOKPIT_SESSION_SECRET: change-this-to-a-random-32-char-secret-before-use
    volumes:
      - ./data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
