# ═══════════════════════════════════════════════════════════════
# Kokpit — settings.yaml
#
# This file is the source of truth for your dashboard configuration.
# The in-app UI reads from and writes back to this file.
# Changes here take effect without restarting the server (dev mode).
#
# Schema version: 1 (Phase 1 will finalize the full schema + validator)
# ═══════════════════════════════════════════════════════════════

schema_version: 1


# ─── Auth ────────────────────────────────────────────────────
# Phase 1 — Authentication system will expand this section.
# When auth.enabled is true, all routes require a valid session.
# ─────────────────────────────────────────────────────────────
auth:
  enabled: true           # Set false to disable auth (or use KOKPIT_AUTH_DISABLED=true env var)
  session_ttl_hours: 24
  # users: []             # Populated by first-run setup wizard


# ─── Appearance ───────────────────────────────────────────────
# Phase 1 (Base UI shell) and Phase 3 (Theme engine) will expand this.
# ─────────────────────────────────────────────────────────────
appearance:
  theme: dark             # Options: dark | light | oled | high-contrast
  # custom_css: |
  #   /* Your custom CSS here. This is injected last and always wins. */
  #   :root { --color-accent: #f97316; }


# ─── Layout ───────────────────────────────────────────────────
# Phase 3 (Drag-and-drop layout editor) will populate positions.
# ─────────────────────────────────────────────────────────────
layout:
  columns: 4
  row_height: 120         # pixels


# ─── Services (app tiles + optional inline widgets) ───────────
# Each service is a dashboard tile. Attach a widget: block to
# display live data from that service inside the same tile.
# Use position: to pin a tile in the grid (Phase 3 drag-and-drop
# will write this field automatically).
#
# A tile without url: is a "pure widget" tile (e.g. system stats).
# ─────────────────────────────────────────────────────────────
services: []
# Example entries (uncomment to use):
# services:
#   - name: Jellyfin
#     url: http://192.168.1.10:8096
#     icon: jellyfin
#     description: Media server
#     group: Media
#     widget:
#       type: jellyfin
#       config:
#         key: your_api_key_here
#       fields: [streams, movies, episodes]
#
#   - name: Pi-hole
#     url: http://192.168.1.1/admin
#     icon: pi-hole
#     description: DNS ad blocker
#     group: Network
#     widget:
#       type: pihole
#       config:
#         key: your_api_key_here
#
#   - name: System Stats
#     description: CPU, RAM, disk usage
#     position: { col: 1, row: 1, width: 2, height: 1 }
#     widget:
#       type: system-stats
