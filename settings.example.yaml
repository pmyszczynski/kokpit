# ═══════════════════════════════════════════════════════════════
# Kokpit — settings.example.yaml
#
# Copy this file to settings.yaml and fill in your values.
# settings.yaml is gitignored — your credentials stay local.
#
# The in-app UI reads from and writes back to settings.yaml.
# Changes take effect without restarting the server (dev mode).
#
# Schema version: 1 (Phase 1 will finalize the full schema + validator)
# ═══════════════════════════════════════════════════════════════

schema_version: 1

# ─── Auth ────────────────────────────────────────────────────
# When auth.enabled is true, all routes require a valid session.
# ─────────────────────────────────────────────────────────────
auth:
  enabled: true # Set false to disable auth (or use KOKPIT_AUTH_DISABLED=true env var)
  session_ttl_hours: 24
  # users: []             # Populated by first-run setup wizard

# ─── Appearance ───────────────────────────────────────────────
appearance:
  theme: dark
  # card_blur: 8            # optional; frosted-glass blur (px) on tiles.
  #                         # Cards stay opaque unless this is set (> 0).
  # background:             # optional dashboard background. All keys optional.
  #   color: "#0b0d12"      # solid color, OR
  #   gradient: "linear-gradient(135deg, #0b0d12, #1a2233)"  # OR
  #   image: /api/backgrounds/user/<hash>.jpg  # uploaded path or any image URL
  #                         # (last-wins if more than one of the three is set:
  #                         #  image > gradient > color)
  #   blur: 12              # blur-behind radius (px)
  #   brightness: 0.7       # 0–1, dims the image
  #   opacity: 0.4          # 0–1, theme-tinted overlay on top of the background
layout:
  columns: 4
  row_height: 120 # pixels
  # ungrouped: last       # Where the implicit "ungrouped" section renders:
  #                       # first | last (default: last)

# ─── Groups (optional) ────────────────────────────────────────
# Ordered group declarations — array order is display order.
# Groups referenced by services but not listed here are appended
# automatically (alphabetically), so this block is optional.
# ─────────────────────────────────────────────────────────────
# groups:
#   - name: Media
#     collapsed: false    # default expanded; live state is per-browser
#     columns: 4          # optional per-group column override
#   - name: Downloads
#   - name: Infrastructure

# ─── Services (app tiles + optional inline widgets) ───────────
# Each service is a dashboard tile. Attach a widget: block to
# display live data from that service inside the same tile.
#
# A tile without url: is a "pure widget" tile (e.g. system stats).
# ─────────────────────────────────────────────────────────────
services: []

# Tile sizing: every service accepts an optional size preset —
#   size: normal | wide | tall | large   (normal = 1×1, wide = 2×1,
#   tall = 1×2, large = 2×2). When omitted, the widget's preferred
#   size applies (e.g. queue/list widgets suggest "tall"), falling
#   back to "normal". The legacy position: field is DEPRECATED —
#   use size: plus array order instead.
#
# Example entries (uncomment and fill in your values):
# services:
#   - name: Plex
#     url: http://192.168.1.x:32400
#     group: Media
#     size: large
#     widget:
#       type: plex
#       config:
#         url: http://192.168.1.x:32400
#         token: <your-plex-token>
#         fields:
#           - streams
#           - transcodes
#
#   - name: qBittorrent Stats
#     url: http://192.168.1.x:8080
#     widget:
#       type: qbittorrent-stats
#       config:
#         url: http://192.168.1.x:8080
#         username: <your-username>
#         password: <your-password>
#
#   - name: qBittorrent Torrents
#     url: http://192.168.1.x:8080
#     widget:
#       type: qbittorrent-torrents
#       config:
#         url: http://192.168.1.x:8080
#         username: <your-username>
#         password: <your-password>
#
#   - name: SABnzbd
#     url: http://192.168.1.x:8080
#     widget:
#       type: sabnzbd
#       config:
#         url: http://192.168.1.x:8080
#         apikey: <your-api-key>
#
#   - name: Jellyfin
#     url: http://192.168.1.x:8096
#     widget:
#       type: jellyfin
#       config:
#         key: <your-api-key>
#
#   - name: Pi-hole
#     url: http://192.168.1.x/admin
#     widget:
#       type: pihole
#       config:
#         key: <your-api-key>
#
#   - name: Immich
#     url: http://192.168.1.x:2283
#     widget:
#       type: immich-stats
#       config:
#         url: http://192.168.1.x:2283/api
#         api_key: <your-api-key>
#
#   - name: System Stats
#     description: CPU, RAM, disk usage
#     size: wide
#     widget:
#       type: system-stats

# ─── Bookmarks (optional) ─────────────────────────────────────
# A bookmark group is a single grid tile holding plain links —
# far cheaper than one service tile per link. Placement is
# optional; by default bookmark tiles render at the end.
# ─────────────────────────────────────────────────────────────
# bookmarks:
#   - name: Dev
#     accent: "#7aa2f7"           # group accent (header + link markers)
#     style: list                 # list | icon-grid | compact (default: list)
#     placement:
#       group: Infrastructure     # optional: render inside this group
#       size: tall                # optional: tile size preset
#     links:
#       - name: GitHub
#         url: https://github.com
#         icon: sh-github         # optional; falls back to favicon, then abbr
#       - name: Grafana docs
#         url: https://grafana.com/docs
#         abbr: GD                # 2-letter fallback when there is no icon
#         description: Panels & alerting reference # shown in list style only
